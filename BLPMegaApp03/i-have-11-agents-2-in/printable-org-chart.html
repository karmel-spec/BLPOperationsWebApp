<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLP Agent Team Printable Org Chart</title>
    <style>
      :root {
        --ink: #141414;
        --muted: #686868;
        --line: #d8d8d8;
        --paper: #ffffff;
        --mist: #f4f3ef;
        --red: #a7191d;
        --green: #55715f;
        --blue: #425e79;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: #ecebe7;
        font-family: Arial, Helvetica, sans-serif;
      }

      .page {
        width: min(1280px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 28px;
        background: var(--paper);
        border: 1px solid var(--line);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 22px;
      }

      .toolbar button {
        min-height: 42px;
        padding: 0 16px;
        color: var(--paper);
        background: var(--red);
        border: 0;
        font-weight: 700;
        cursor: pointer;
      }

      .titlebar {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 22px;
        align-items: center;
        padding-bottom: 20px;
        border-bottom: 3px solid var(--ink);
      }

      .titlebar img {
        width: 190px;
        max-width: 100%;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--red);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.05;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 18px 0;
      }

      .summary article {
        padding: 12px;
        background: var(--mist);
        border: 1px solid var(--line);
      }

      .summary span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .summary strong {
        display: block;
        margin-top: 2px;
        font-size: 28px;
      }

      .leadership {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
        padding: 16px;
        border: 2px solid var(--ink);
      }

      .leadership-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .departments {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .department {
        display: grid;
        gap: 10px;
        break-inside: avoid;
        padding: 14px;
        border: 1px solid var(--line);
      }

      .department header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: start;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }

      h2,
      h3 {
        margin: 0;
      }

      h2 {
        font-size: 22px;
      }

      h3 {
        font-size: 18px;
      }

      .count {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .agent-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .agent {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 9px;
        align-items: center;
        min-height: 68px;
        padding: 8px;
        background: var(--mist);
        border: 1px solid var(--line);
      }

      .leadership .agent {
        grid-template-columns: 72px 1fr;
        min-height: 88px;
      }

      .agent img {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 6px;
        background: #ddd;
      }

      .leadership .agent img {
        width: 72px;
        height: 72px;
      }

      .agent strong {
        display: block;
        font-size: 15px;
      }

      .leadership .agent strong {
        font-size: 18px;
      }

      .agent small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.25;
      }

      .status {
        display: inline-block;
        margin-top: 6px;
        color: var(--red);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .status.on-deck {
        color: var(--blue);
      }

      .legend {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 16px;
        color: var(--muted);
        font-size: 12px;
      }

      .legend span::before {
        display: inline-block;
        width: 9px;
        height: 9px;
        margin-right: 6px;
        border-radius: 50%;
        content: "";
      }

      .legend .active::before {
        background: var(--red);
      }

      .legend .ondeck::before {
        background: var(--blue);
      }

      .legend .hermes::before {
        background: var(--green);
      }

      @media print {
        @page {
          size: landscape;
          margin: 0.35in;
        }

        body {
          background: #fff;
        }

        .page {
          width: auto;
          margin: 0;
          padding: 0;
          border: 0;
        }

        .toolbar {
          display: none;
        }

        .department,
        .leadership {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="toolbar">
        <strong>Printable org chart</strong>
        <button type="button" onclick="window.print()">Print / Save PDF</button>
      </div>

      <header class="titlebar">
        <img src="assets/brand/blp-logo.png" alt="Brigham Larson Pianos" />
        <div>
          <p class="eyebrow">Agent Operations Console</p>
          <h1>BLP Agent Team Org Chart</h1>
          <p class="subtitle" id="subtitle">Active and on-deck agent team structure.</p>
        </div>
      </header>

      <section class="summary" id="summary"></section>
      <section class="leadership" id="leadership"></section>
      <section class="departments" id="departments"></section>

      <footer class="legend">
        <span class="active">Active agent</span>
        <span class="ondeck">On deck</span>
        <span class="hermes">Hermes / OpenClaw shown on each card</span>
      </footer>
    </main>

    <script src="data/agents-data.js"></script>
    <script src="app-data.js"></script>
    <script>
      const { agents } = window.BLP_DATA;
      const departmentOrder = [
        "Technical",
        "Shop",
        "Sales",
        "Admin & Customer Service",
        "Fieldwork",
        "Operations",
        "Marketing",
        "Accounting & Finance",
      ];

      function agentImage(agent) {
        return encodeURI(agent.avatar);
      }

      function agentCard(agent) {
        return `
          <article class="agent">
            <img src="${agentImage(agent)}" alt="${agent.name}" />
            <div>
              <strong>${agent.name}</strong>
              <small>${agent.role}</small>
              <span class="status ${agent.status === "On Deck" ? "on-deck" : ""}">${agent.status} · ${agent.system}</span>
            </div>
          </article>
        `;
      }

      function render() {
        const active = agents.filter((agent) => agent.status === "Active");
        const onDeck = agents.filter((agent) => agent.status === "On Deck");
        const hermes = active.filter((agent) => agent.system === "Hermes").length;
        const openClaw = active.filter((agent) => agent.system === "OpenClaw").length;

        document.getElementById("subtitle").textContent = `Generated ${new Date().toLocaleDateString()} · ${active.length} active · ${onDeck.length} on deck`;
        document.getElementById("summary").innerHTML = `
          <article><span>Total agents</span><strong>${agents.length}</strong></article>
          <article><span>Active</span><strong>${active.length}</strong></article>
          <article><span>Hermes active</span><strong>${hermes}</strong></article>
          <article><span>OpenClaw active</span><strong>${openClaw}</strong></article>
        `;

        const leadership = agents.filter((agent) => agent.department === "Leadership");
        document.getElementById("leadership").innerHTML = `
          <header>
            <div>
              <p class="eyebrow">Leadership</p>
              <h2>Leadership</h2>
            </div>
            <span class="count">${leadership.filter((agent) => agent.status === "Active").length} active</span>
          </header>
          <div class="leadership-grid">${leadership.map(agentCard).join("")}</div>
        `;

        document.getElementById("departments").innerHTML = departmentOrder
          .map((department) => {
            const members = agents.filter((agent) => agent.department === department);
            const activeCount = members.filter((agent) => agent.status === "Active").length;
            return `
              <section class="department">
                <header>
                  <h3>${department}</h3>
                  <span class="count">${activeCount} active · ${members.length - activeCount} on deck</span>
                </header>
                <div class="agent-list">${members.map(agentCard).join("")}</div>
              </section>
            `;
          })
          .join("");
      }

      render();
    </script>
  </body>
</html>
